  wind_turbine:
    - Wind_Turbine_1
    - Wind_Turbine_2
    - Wind_Turbine_Senvion
    - Wind_Turbine_Siemens_SWT_1
    - Wind_Turbine_Senvion_Maintenance
    - Wind_Turbine_Siemens_SWT_1_Generator
