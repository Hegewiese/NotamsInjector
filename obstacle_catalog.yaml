  chimney_stack:
    - glx_aa_Chimney_a100
    - glx_aa_Chimney_a200


  building:
    - Wind_Turbine_2

  generic_obstacle:
    - Pipelay_Crane_SK3000

  # Separate key used for vertical highlight markers.
  beacon:
    - Wind_Turbine_2

  # Runway closure barriers — placed across the threshold.
  runway_closure:
    - Wind_Turbine_Senvion
    - NotamsInjector_MyCube_01

  # ICAO Annex 14 flat yellow X ground markers — three size variants.
  # Requires dist/community/notamsinjector-rwy-x/ installed in MSFS.
  # Scheduler picks the variant matching rwy.width_ft; each falls back
  # to the next larger size if the model is not found.
  runway_closure_x_s:   # < 30 m (< 100 ft)  — arm 10 m × 1.8 m
    placement_type: simobject
    titles:
      - NotamsInjector_Runway_Closed_X_S
      - NotamsInjector_Runway_Closed_X_M

  runway_closure_x_m:   # 30–45 m (100–150 ft) — arm 18 m × 3.0 m
    placement_type: simobject
    titles:
      - NotamsInjector_Runway_Closed_X_M
      - NotamsInjector_Runway_Closed_X_L

  runway_closure_x_l:   # > 45 m (> 150 ft)  — arm 27 m × 4.5 m  (e.g. EDDF)
    placement_type: simobject
    titles:
      - NotamsInjector_Runway_Closed_X_L
      - NotamsInjector_Runway_Closed_X_M
