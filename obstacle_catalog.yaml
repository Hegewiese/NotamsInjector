  crane:
    placement_type: simobject
    titles:
      - Construction_BigCrane01
      - Wind_Turbine_Senvion
      - Pipelay_Crane_SK3000
      - Wind_Turbine_2
      - Wind_Turbine_1
      

  mast_tower_antenna:
